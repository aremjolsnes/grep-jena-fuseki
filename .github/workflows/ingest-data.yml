name: Ingest Grep Data

on:
  schedule:
    - cron: '0 0 * * 0' # Hver søndag kl 00:00
  workflow_dispatch: # Mulighet for å starte manuelt

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Data
        run: |
          mkdir temp
          curl -L https://data.udir.no/kl06/v201906/dump/jsonld -o temp/data.zip
          unzip temp/data.zip -d temp/extracted

      - name: Wipe and Reload Fuseki
        env:
          FUSEKI_URL: ${{ secrets.FUSEKI_PROD_URL }}
          FUSEKI_USER: ${{ secrets.FUSEKI_USER }}
          FUSEKI_PASSWORD: ${{ secrets.FUSEKI_PASSWORD }}
          DATASET: "ds"
        run: |
          echo "Wiping existing data in $DATASET..."
          # Tømmer datasettet før vi starter
          # Tømmer datasettet før vi starter (vi bruker GSP - Graph Store Protocol for tømming)
          curl -u "$FUSEKI_USER:$FUSEKI_PASSWORD" -X DELETE "$FUSEKI_URL/$DATASET/data?default" || true
          
          echo "Uploading new data to $DATASET..."
          # Vi laster opp EN OG EN fil med en liten pause mellom hver for maksimal stabilitet.
          find temp/extracted/ -name "*.jsonld" | while read file; do
            echo "Processing $file..."
            curl -u "$FUSEKI_USER:$FUSEKI_PASSWORD" \
                 -s -S -o /dev/null -w "Status: %{http_code} - Fil: $file \n" \
                 --fail \
                 -X POST \
                 -H "Content-Type: application/ld+json" \
                 --data-binary @"$file" \
                 "$FUSEKI_URL/$DATASET/data"
          done
          
          echo "Ingest complete!"

name: Ingest Grep Data

on:
  schedule:
    - cron: '0 21 * * *' # Hver natt kl 22:00 (Norsk tid / CET)
  workflow_dispatch: # Mulighet for å starte manuelt

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Data
        run: |
          mkdir temp
          curl -L https://data.udir.no/kl06/v201906/dump/jsonld -o temp/data.zip
          unzip temp/data.zip -d temp/extracted

      - name: Wipe and Reload Fuseki
        env:
          FUSEKI_URL: ${{ secrets.FUSEKI_PROD_URL }}
          FUSEKI_USER: ${{ secrets.FUSEKI_USER }}
          FUSEKI_PASSWORD: ${{ secrets.FUSEKI_PASSWORD }}
          DATASET: "ds"
        run: |
          echo "Venter på at Fly.io maskinen skal våkne..."
          # Vi prøver å treffe ping-endepunktet til det svarer. $/ping er standard i Fuseki.
          for i in {1..30}; do
            if curl -s -o /dev/null -u "$FUSEKI_USER:$FUSEKI_PASSWORD" --fail "$FUSEKI_URL/$/ping"; then
              echo "Serveren er våken og klar etter $i forsøk!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "FEIL: Serveren våknet ikke i tide."
              exit 1
            fi
            echo "Venter fremdeles (forsøk $i/30)..."
            sleep 5
          done

          echo "Tømmer gammelt datasett (Vasker gulvet skikkelig med CLEAR DEFAULT)..."
          # Vi bruker --data-urlencode for korrekt SPARQL-overføring
          curl -u "$FUSEKI_USER:$FUSEKI_PASSWORD" \
               -X POST \
               -H "Content-Type: application/x-www-form-urlencoded" \
               --data-urlencode "update=CLEAR DEFAULT" \
               --fail \
               "$FUSEKI_URL/$DATASET/update" || echo "Kunne ikke tømme via SPARQL (normalt hvis db er korrupt)"

          echo "Venter 30 sekunder på at Fuseki skal rydde ferdig på disken og roe ned GC..."
          sleep 30

          echo "Uploading new data to $DATASET (Sekvensiell modus med progress-logging)..."
          # Vi bruker en vanlig loop for bedre kontroll og logging
          files=$(find temp/extracted -name "*.jsonld")
          total=$(echo "$files" | wc -l)
          current=0
          
          echo "Fant $total filer som skal lastes opp."
          
          while read -r file; do
            current=$((current+1))
            echo "[$current/$total] Laster opp $file..."
            curl -u "$FUSEKI_USER:$FUSEKI_PASSWORD" \
                 -X POST \
                 -H "Content-Type: application/ld+json" \
                 --data-binary @"$file" \
                 --retry 5 --retry-delay 10 \
                 --connect-timeout 60 \
                 --max-time 300 \
                 --fail \
                 "$FUSEKI_URL/$DATASET/data?default"
          done <<< "$files"
          
          echo "Ingest complete! 1.1 mill tripler er (forhåpentligvis) på plass."

name: Ingest Grep Data

on:
  schedule:
    - cron: '0 0 * * 0' # Hver søndag kl 00:00
  workflow_dispatch: # Mulighet for å starte manuelt

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Data
        run: |
          mkdir temp
          curl -L https://data.udir.no/kl06/v201906/dump/jsonld -o temp/data.zip
          unzip temp/data.zip -d temp/extracted

      - name: Wipe and Reload Fuseki
        env:
          FUSEKI_URL: ${{ secrets.FUSEKI_PROD_URL }}
          FUSEKI_USER: ${{ secrets.FUSEKI_USER }}
          FUSEKI_PASSWORD: ${{ secrets.FUSEKI_PASSWORD }}
          DATASET: "ds"
        run: |
          echo "Venter på at Fly.io maskinen skal våkne..."
          # Vi prøver å treffe ping-endepunktet til det svarer. $/ping er standard i Fuseki.
          for i in {1..30}; do
            if curl -s -o /dev/null -u "$FUSEKI_USER:$FUSEKI_PASSWORD" --fail "$FUSEKI_URL/$/ping"; then
              echo "Serveren er våken og klar etter $i forsøk!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "FEIL: Serveren våknet ikke i tide."
              exit 1
            fi
            echo "Venter fremdeles (forsøk $i/30)..."
            sleep 5
          done

          echo "Tømmer gammelt datasett (hvis det finnes)..."
          curl -u "$FUSEKI_USER:$FUSEKI_PASSWORD" -X DELETE "$FUSEKI_URL/$DATASET/data?default" || true
          
          echo "Uploading new data to $DATASET..."
          # Vi bruker POST for å LEGGE TIL (append) data i stedet for PUT som erstatter.
          # Vi bruker -P 2 for å kjøre 2 opplastinger samtidig for maksimal stabilitet.
          find temp/extracted -name "*.jsonld" | xargs -I {} -P 2 curl -u "$FUSEKI_USER:$FUSEKI_PASSWORD" \
               -X POST \
               -H "Content-Type: application/ld+json" \
               --data-binary @"{}" \
               --retry 3 --retry-delay 2 \
               --fail \
               "$FUSEKI_URL/$DATASET/data?default"
          
          echo "Ingest complete!"

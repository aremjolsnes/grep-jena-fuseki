name: Ingest Grep Data

on:
  schedule:
    - cron: '0 21 * * *' # Hver natt kl 22:00 (Norsk tid / CET)
  workflow_dispatch: # Mulighet for å starte manuelt

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Data
        run: |
          mkdir temp
          curl -L https://data.udir.no/kl06/v201906/dump/jsonld -o temp/data.zip
          unzip temp/data.zip -d temp/extracted

      - name: Wipe and Reload Fuseki
        env:
          FUSEKI_URL: ${{ secrets.FUSEKI_PROD_URL }}
          FUSEKI_USER: ${{ secrets.FUSEKI_USER }}
          FUSEKI_PASSWORD: ${{ secrets.FUSEKI_PASSWORD }}
          DATASET: "ds"
        run: |
          # Vask URL-en for trailing slashes
          FUSEKI_URL=$(echo "${{ secrets.FUSEKI_PROD_URL }}" | sed 's/\/$//')
          echo "Bruker URL: $FUSEKI_URL"

          echo "Venter på at Fly.io maskinen skal våkne..."
          for i in {1..30}; do
            if curl -s -o /dev/null -u "$FUSEKI_USER:$FUSEKI_PASSWORD" --fail "$FUSEKI_URL/$/ping"; then
              echo "Serveren er våken! Sjekker om datasettet '$DATASET' er klart..."
              if curl -s -o /dev/null -u "$FUSEKI_USER:$FUSEKI_PASSWORD" --fail "$FUSEKI_URL/$DATASET/data?default"; then
                echo "Datasettet er også klart etter $i forsøk!"
                break
              fi
            fi
            if [ $i -eq 30 ]; then
              echo "FEIL: Serveren eller datasettet våknet ikke i tide."
              exit 1
            fi
            echo "Venter fremdeles (forsøk $i/30)..."
            sleep 5
          done

          echo "Tømmer gammelt datasett (Vasker gulvet ved å overskrive default graph)..."
          curl -u "$FUSEKI_USER:$FUSEKI_PASSWORD" \
               -L \
               -X PUT \
               -H "Content-Type: text/turtle" \
               --data "" \
               --fail \
               "$FUSEKI_URL/$DATASET/data?default"

          echo "Venter 5 sekunder på at tømmingen skal ferdigstilles..."
          sleep 5

          count_after=$(curl -s -u "$FUSEKI_USER:$FUSEKI_PASSWORD" \
               -L \
               --data-urlencode "query=SELECT (COUNT(*) as ?count) WHERE { ?s ?p ?o }" \
               -H "Accept: application/sparql-results+json" \
               "$FUSEKI_URL/$DATASET/query" | grep -oE '"value":\s*"[0-9]+"' | grep -oE '[0-9]+' || echo "0")
          echo "Antall tripler etter tømming: $count_after"

          if [ "$count_after" -ne 0 ] && [ ! -z "$count_after" ]; then
            echo "FEIL: Databasen ble ikke tømt korrekt. Avbryter for å unngå duplikater."
            exit 1
          fi

          echo "Venter 30 sekunder på at Fuseki skal roe ned disk og GC før storlast..."
          sleep 30

          echo "Uploading new data to $DATASET (Turbo Parallel Mode: 10 concurrent requests)..."
          files=$(find temp/extracted -name "*.jsonld")
          total=$(echo "$files" | wc -l)
          echo "Fant $total filer som skal lastes opp paralellt."
          
          # Bruk xargs med -P (Parallel) for massiv hastighetsøkning. 
          # Vi bruker et faktor på 10 for å unngå å kvele en 4GB VM.
          # Vi sender filstien som et argument til bash for å unngå quoting-problemer.
          echo "$files" | xargs -n 1 -P 10 -I {} bash -c '
            echo "Laster opp: $1"
            curl -u "$FUSEKI_USER:$FUSEKI_PASSWORD" \
                 -X POST \
                 -H "Content-Type: application/ld+json" \
                 --data-binary @"$1" \
                 --retry 5 --retry-delay 10 \
                 --connect-timeout 60 \
                 --max-time 300 \
                 --fail \
                 -s -o /dev/null \
                 "$FUSEKI_URL/$DATASET/data?default"
          ' -- {}
          
          echo "Ingest complete! 1.1 mill tripler er (forhåpentligvis) på plass."

name: Ingest Grep Data

on:
  schedule:
    - cron: '0 21 * * *' # Hver natt kl 22:00 (Norsk tid / CET)
  workflow_dispatch: # Mulighet for å starte manuelt

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Data
        run: |
          mkdir temp
          curl -L https://data.udir.no/kl06/v201906/dump/jsonld -o temp/data.zip
          unzip temp/data.zip -d temp/extracted

      - name: Process and Upload Data
        env:
          FUSEKI_URL: ${{ secrets.FUSEKI_PROD_URL }}
          FUSEKI_USER: ${{ secrets.FUSEKI_USER }}
          FUSEKI_PASSWORD: ${{ secrets.FUSEKI_PASSWORD }}
          DATASET: "ds"
        run: |
          # 1. Installer Apache Jena (for RIOT verktøyet)
          echo "Laster ned Apache Jena for konvertering..."
          wget -q https://archive.apache.org/dist/jena/binaries/apache-jena-5.3.0.tar.gz
          tar -xf apache-jena-5.3.0.tar.gz
          RIOT_CMD=$(pwd)/apache-jena-5.3.0/bin/riot
          
          # 2. Konverter alle JSON-LD filer til én stor N-Triples fil
          # Vi gjør dette for å få kun EN transaksjon i Fuseki, som sparer ekstremt mye disk og tid.
          echo "Konverterer 47k JSON-LD filer til én stor N-Triples fil..."
          find temp/extracted -name "*.jsonld" > file_list.txt
          $RIOT_CMD --output=nt $(cat file_list.txt) > all_data.nt
          echo "Konvertering ferdig. Filstørrelse: $(du -h all_data.nt)"

          # 3. Vask URL-en for trailing slashes
          FUSEKI_URL=$(echo "${{ secrets.FUSEKI_PROD_URL }}" | sed 's/\/$//')
          
          echo "Venter på at Fly.io maskinen skal våkne..."
          for i in {1..30}; do
            if curl -s -o /dev/null -u "$FUSEKI_USER:$FUSEKI_PASSWORD" --fail "$FUSEKI_URL/$/ping"; then
              echo "Serveren er våken!"
              break
            fi
            sleep 5
          done

          echo "Tømmer gammelt datasett med HTTP DELETE..."
          curl -u "$FUSEKI_USER:$FUSEKI_PASSWORD" -X DELETE "$FUSEKI_URL/$DATASET/data?default"
          sleep 5

          echo "Laster opp samlet datasett (Eneste transaksjon)..."
          curl -u "$FUSEKI_USER:$FUSEKI_PASSWORD" \
               -X POST \
               -H "Content-Type: application/n-triples" \
               --data-binary @all_data.nt \
               --fail-with-body \
               "$FUSEKI_URL/$DATASET/data?default"
          
          echo "Ingest complete! 1.1 mill tripler er på plass via én ryddig transaksjon."

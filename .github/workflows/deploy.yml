name: PLAN-E-DEPLOY
# Trigger deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly.io
        run: |
          # Prøv å opprette appen hvis den ikke finnes fra før
          flyctl apps create grep-fuseki-v3 --org personal || true
          # Rull ut appen (bruker immediate strategi for å prøve å overstyre låste maskiner)
          flyctl deploy --local-only --yes --strategy immediate
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_DEPOT_DISABLE: 1
